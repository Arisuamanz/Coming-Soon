<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cinematic Update Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Menggunakan fon sinematik untuk tajuk dan fon bersih untuk teks biasa */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Latar gelap sementara canvas loading */
        }

        .fullscreen-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
        }

        /* Canvas untuk melukis animasi sprite */
        #spriteCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Fon Sinematik */
        .font-cinematic {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.2em;
        }

        .font-sans-clean {
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.1em;
        }

        /* Animasi Sinematik Teks */
        .reveal-text {
            opacity: 0;
            transform: scale(0.95) translateY(10px);
            transition: all 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .modal-active .reveal-text {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Kelewatan berbeza untuk setiap elemen bagi efek filem */
        .delay-1 { transition-delay: 0.2s; }
        .delay-2 { transition-delay: 0.6s; }
        .delay-3 { transition-delay: 1.0s; }
        
        /* Garisan efek cahaya perlahan */
        .cinematic-line {
            width: 0;
            height: 1px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 100%);
            transition: width 1.5s ease-in-out;
            transition-delay: 0.4s;
            margin: 1.5rem auto;
        }

        .modal-active .cinematic-line {
            width: 120px;
        }
    </style>
</head>
<body>

    <!-- Gambar Penuh Tanpa Halangan (Kini menggunakan Canvas) -->
    <div id="trigger" class="fullscreen-container">
        <canvas id="spriteCanvas"></canvas>
    </div>

    <!-- Modal Sinematik di Tengah -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-1000 ease-in-out">
        
        <!-- Latar belakang gelap dramatik (radial gradient) -->
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_transparent_0%,_rgba(0,0,0,0.9)_100%)] bg-black/70 backdrop-blur-sm" onclick="closeModal()"></div>
        
        <!-- Kandungan Tengah -->
        <div id="modalContent" class="relative z-10 text-center px-6 flex flex-col items-center w-full max-w-lg">
            
            <p class="font-sans-clean text-blue-400 text-xs md:text-sm uppercase reveal-text delay-1">
                A New Era Begins
            </p>
            
            <div class="cinematic-line"></div>

            <h1 class="font-cinematic text-4xl md:text-5xl text-white uppercase drop-shadow-[0_0_15px_rgba(255,255,255,0.3)] reveal-text delay-2 mb-2">
                Coming Soon
            </h1>
            
            <p class="font-sans-clean text-slate-300 text-sm md:text-base leading-relaxed reveal-text delay-3 mt-6 font-light">
                This upcoming soon in the next Update
            </p>

            <button 
                onclick="closeModal()"
                class="mt-12 text-white/50 hover:text-white font-sans-clean text-xs uppercase tracking-widest reveal-text delay-3 transition-colors duration-300"
            >
                Tap to close
            </button>
        </div>
    </div>

    <script>
        // --- LOGIK ANIMASI SPRITE (MENGGUNAKAN DELTA TIME) ---
        const canvas = document.getElementById('spriteCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        
        // Pautan gambar baharu dari Cloudinary
        img.src = "https://res.cloudinary.com/dsqi4tm8x/image/upload/v1772471484/460781_qbhjpi.png";

        // Tetapan Spritesheet
        const cols = 7;
        const rows = 7;
        const totalFrames = cols * rows; // 49 frames
        const fps = 15; // Kelajuan animasi 15 FPS
        const frameInterval = 1000 / fps; // Masa untuk setiap frame dalam milisaat
        
        let currentFrame = 0;
        let lastTime = 0;
        let isAnimating = false;

        // Fungsi resize canvas supaya muat skrin penuh
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Draw immediately on resize to prevent flickering
            if (img.complete && !isAnimating) {
                drawFrame(0);
            }
        }

        window.addEventListener('resize', resizeCanvas);

        function drawFrame(deltaTime) {
            // Bersihkan canvas sebelum lukis frame baru
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (img.complete) {
                // Kira saiz sebenar satu frame dari sumber imej
                const frameW = img.width / cols;
                const frameH = img.height / rows;
                
                // Cari kedudukan (X, Y) untuk potong frame dari spritesheet
                const srcX = (currentFrame % cols) * frameW;
                const srcY = Math.floor(currentFrame / cols) * frameH;

                // Logik untuk jadikan imej 'object-fit: cover' dalam canvas
                const scale = Math.max(canvas.width / frameW, canvas.height / frameH);
                const destW = frameW * scale;
                const destH = frameH * scale;
                
                // Center kan imej
                const destX = (canvas.width - destW) / 2;
                const destY = (canvas.height - destH) / 2;

                // Lukis frame ke atas canvas
                ctx.drawImage(img, srcX, srcY, frameW, frameH, destX, destY, destW, destH);
            }
        }

        // Loop Animasi
        function animateSprite(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const deltaTime = timestamp - lastTime;

            // Update frame berdasarkan delta time
            if (deltaTime >= frameInterval) {
                currentFrame = (currentFrame + 1) % totalFrames;
                // Kekalkan baki masa untuk timing yang konsisten (elak animasi lari/drift)
                lastTime = timestamp - (deltaTime % frameInterval); 
                drawFrame(deltaTime);
            } else if (!isAnimating) {
                drawFrame(0);
            }

            isAnimating = true;
            requestAnimationFrame(animateSprite);
        }

        // Mula animasi selepas imej dimuat turun
        img.onload = () => {
            resizeCanvas();
            requestAnimationFrame(animateSprite);
        };


        // --- LOGIK MODAL SINEMATIK ---
        const trigger = document.getElementById('trigger');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modalContent');

        // Buka Modal
        trigger.addEventListener('click', () => {
            modal.classList.remove('pointer-events-none');
            modal.classList.add('opacity-100');
            
            requestAnimationFrame(() => {
                modalContent.classList.add('modal-active');
            });
        });

        // Tutup Modal
        function closeModal(e) {
            if (e) e.stopPropagation(); // Elak trigger pada div belakang
            modalContent.classList.remove('modal-active');
            modal.classList.remove('opacity-100');
            modal.classList.add('pointer-events-none');
        }

        // Handle Escape Key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
