<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cinematic Update Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Menggunakan fon sinematik untuk tajuk dan fon bersih untuk teks biasa */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .fullscreen-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
        }

        .fullscreen-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Fon Sinematik */
        .font-cinematic {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.2em;
        }

        .font-sans-clean {
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.1em;
        }

        /* Animasi Sinematik Teks */
        .reveal-text {
            opacity: 0;
            transform: scale(0.95) translateY(10px);
            transition: all 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .modal-active .reveal-text {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Kelewatan berbeza untuk setiap elemen bagi efek filem */
        .delay-1 { transition-delay: 0.2s; }
        .delay-2 { transition-delay: 0.6s; }
        .delay-3 { transition-delay: 1.0s; }
        
        /* Garisan efek cahaya perlahan */
        .cinematic-line {
            width: 0;
            height: 1px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 100%);
            transition: width 1.5s ease-in-out;
            transition-delay: 0.4s;
            margin: 1.5rem auto;
        }

        .modal-active .cinematic-line {
            width: 120px;
        }
    </style>
</head>
<body>

    <!-- Gambar Penuh Tanpa Halangan -->
    <div id="trigger" class="fullscreen-container">
        <img 
            src="https://i.postimg.cc/zBMsL9VC/460719.png" 
            alt="Background Update" 
            class="fullscreen-image"
            onerror="this.src='https://via.placeholder.com/1080x1920?text=Image+Not+Found'"
        >
    </div>

    <!-- Modal Sinematik di Tengah -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-1000 ease-in-out">
        
        <!-- Latar belakang gelap dramatik (radial gradient) -->
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_transparent_0%,_rgba(0,0,0,0.9)_100%)] bg-black/70 backdrop-blur-sm" onclick="closeModal()"></div>
        
        <!-- Kandungan Tengah -->
        <div id="modalContent" class="relative z-10 text-center px-6 flex flex-col items-center w-full max-w-lg">
            
            <p class="font-sans-clean text-blue-400 text-xs md:text-sm uppercase reveal-text delay-1">
                A New Era Begins
            </p>
            
            <div class="cinematic-line"></div>

            <h1 class="font-cinematic text-4xl md:text-5xl text-white uppercase drop-shadow-[0_0_15px_rgba(255,255,255,0.3)] reveal-text delay-2 mb-2">
                Coming Soon
            </h1>
            
            <p class="font-sans-clean text-slate-300 text-sm md:text-base leading-relaxed reveal-text delay-3 mt-6 font-light">
                This upcoming soon in the next Update
            </p>

            <button 
                onclick="closeModal()"
                class="mt-12 text-white/50 hover:text-white font-sans-clean text-xs uppercase tracking-widest reveal-text delay-3 transition-colors duration-300"
            >
                Tap to close
            </button>
        </div>
    </div>

    <script>
        const trigger = document.getElementById('trigger');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modalContent');

        // Buka Modal Sinematik
        trigger.addEventListener('click', () => {
            modal.classList.remove('pointer-events-none');
            modal.classList.add('opacity-100');
            
            // Trigger CSS animations dengan sedikit delay
            requestAnimationFrame(() => {
                modalContent.classList.add('modal-active');
            });
        });

        // Tutup Modal Sinematik
        function closeModal() {
            modalContent.classList.remove('modal-active');
            modal.classList.remove('opacity-100');
            modal.classList.add('pointer-events-none');
        }

        // Handle Escape Key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
